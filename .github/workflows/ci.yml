name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default — this workflow only reads code and runs
# tests, it never needs to write to the repo, packages, or deployments.
permissions:
  contents: read

defaults:
  run:
    working-directory: candidate/service

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orders
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d orders"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/orders
      FRONTEND_ORIGIN: http://localhost:5173
      DB_POOL_SIZE: '10'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: candidate/service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Build
        run: npm run build

      - name: Apply database migrations
        run: npm run migration:run

      - name: Unit tests
        run: npm run test -- --coverage

      - name: Integration tests
        run: npm run test:e2e
