services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - orders_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d orders']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  orders_postgres_data:
